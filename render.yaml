services:
  - type: web
    name: url-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: URLSCAN_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
